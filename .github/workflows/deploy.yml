name: Deploy Hexo site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:  # 支持手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Hexo
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .cache
          key: ${{ runner.os }}-hexo-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-hexo-

      - name: Install dependencies
        run: npm ci  # 使用 ci 代替 install，更快更可靠

      - name: Build Hexo
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true  # 保持 gh-pages 分支干净