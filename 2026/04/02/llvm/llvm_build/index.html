<p>以win11+git bash为例</p>
<ol>
<li>配置</li>
</ol>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">set</span> -x</span><br><span class="line"></span><br><span class="line"><span class="built_in">export</span> COMPILER_DIR=D:/LLVM/bin/ <span class="comment"># 替换为一个已有compiler的path</span></span><br><span class="line"><span class="built_in">export</span> CC=<span class="variable">$COMPILER_DIR</span>/clang.exe</span><br><span class="line"><span class="built_in">export</span> CXX=<span class="variable">$COMPILER_DIR</span>/clang++.exe</span><br><span class="line"><span class="built_in">export</span> RC_COMPILER=<span class="variable">$LLVM_DIR</span>/llvm-rc.exe</span><br><span class="line"></span><br><span class="line"><span class="built_in">mkdir</span> -p build</span><br><span class="line"><span class="built_in">mkdir</span> -p install</span><br><span class="line"></span><br><span class="line">cmake -S ./llvm -B build -G Ninja -DCMAKE_BUILD_TYPE=DEBUG -DLLVM_ENABLE_PROJECTS=<span class="string">&quot;clang&quot;</span> -DLLVM_TARGETS_TO_BUILD=X86 -DCMAKE_RC_COMPILER=<span class="variable">$RC_COMPILER</span></span><br></pre></td></tr></table></figure>

<ol start="2">
<li>构建，ninja<br>一个线程最少4G内存。4线程16G不一定够用。链接很慢。</li>
</ol>
