  <main class="post-content"><p>以mac air构建为例，耗时26min。</p>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">cmake -G Ninja \</span><br><span class="line">    -DCMAKE_EXPORT_COMPILE_COMMANDS=ON  \</span><br><span class="line">    -S ./llvm -B build \</span><br><span class="line">    -DCMAKE_BUILD_TYPE=RELWITHDEBINFO \</span><br><span class="line">    -DLLVM_BUILD_EXAMPLES=ON \</span><br><span class="line">    -DLLVM_ENABLE_PROJECTS=<span class="string">&quot;mlir&quot;</span> \</span><br><span class="line">    -DLLVM_TARGETS_TO_BUILD=<span class="string">&quot;Native;NVPTX&quot;</span> \</span><br><span class="line">    -DLLVM_ENABLE_ASSERTIONS=ON</span><br><span class="line"></span><br><span class="line"><span class="built_in">cd</span> build &amp;&amp; ninja</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<ul>
<li>把mlir当作lib使用</li>
</ul>
<ol>
<li>需要构建mlir</li>
<li>cmake配置</li>
</ol>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="built_in">set</span> -x</span><br><span class="line"></span><br><span class="line"><span class="built_in">mkdir</span> -p build</span><br><span class="line"><span class="built_in">cd</span> build</span><br><span class="line">cmake .. -GNinja -DCMAKE_INSTALL_PREFIX=/&lt;mlir_path&gt;/install  -DCMAKE_PREFIX_PATH=../build</span><br><span class="line">ninja</span><br><span class="line"></span><br></pre></td></tr></table></figure>
