  <main class="post-content"><h1 id="死代码消除"><a href="#死代码消除" class="headerlink" title="死代码消除"></a>死代码消除</h1><p>在ssa上比较好实现，根据use-def chain传播<br>如果只是运算指令，且没有users，就是dead的指令。<br>其实就是一个use-&gt;def的传播</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">worklist = &#123;&#125;</span><br><span class="line"><span class="keyword">for</span> bb in func&#123;</span><br><span class="line">    <span class="keyword">for</span> inst in bb &#123;</span><br><span class="line">        <span class="keyword">if</span> (inst not in worklist)</span><br><span class="line">            worklist.push(inst)</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span>(!worklist.empty()) &#123;</span><br><span class="line">    inst = worklist.pop()</span><br><span class="line">    <span class="keyword">if</span>( inst is pure &amp;&amp; inst.num_users()== <span class="number">0</span> )&#123;</span><br><span class="line">        <span class="comment">// dead instruction</span></span><br><span class="line">        <span class="keyword">for</span>(op in inst.operands())&#123;</span><br><span class="line">            inst.remove(op)</span><br><span class="line"></span><br><span class="line">            <span class="keyword">if</span> class(op) == instruction and isDead(op) &#123;</span><br><span class="line">                worklist.insert(op)</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
