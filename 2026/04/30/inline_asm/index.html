<p>example:</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdint.h&gt;</span></span></span><br><span class="line"></span><br><span class="line">__attribute__((noinline))</span><br><span class="line"><span class="type">int</span> <span class="title function_">mul_add</span><span class="params">(</span></span><br><span class="line"><span class="params">    <span class="type">int</span> a, <span class="type">int</span> b, <span class="type">int</span> c,</span></span><br><span class="line"><span class="params">    <span class="type">int</span> *sum,</span></span><br><span class="line"><span class="params">    <span class="type">int</span> *acc)</span></span><br><span class="line">&#123;</span><br><span class="line">    <span class="keyword">asm</span> <span class="title function_">volatile</span> <span class="params">(</span></span><br><span class="line"><span class="params">        <span class="string">&quot;imull  %[b], %[a]\n\t&quot;</span></span></span><br><span class="line"><span class="params">        <span class="string">&quot;leal   (%[a], %[c]), %[s]\n\t&quot;</span></span></span><br><span class="line"><span class="params">        <span class="string">&quot;addl   %[a], %[acc]\n\t&quot;</span></span></span><br><span class="line"><span class="params">        : [a]   <span class="string">&quot;+r&quot;</span>(a),        <span class="comment">// read-write</span></span></span><br><span class="line"><span class="params">          [s]   <span class="string">&quot;=r&quot;</span>(*sum),     <span class="comment">// write-only</span></span></span><br><span class="line"><span class="params">          [acc] <span class="string">&quot;+r&quot;</span>(*acc)      <span class="comment">// read-write</span></span></span><br><span class="line"><span class="params">        : [b]   <span class="string">&quot;r&quot;</span>(b),</span></span><br><span class="line"><span class="params">          [c]   <span class="string">&quot;r&quot;</span>(c)</span></span><br><span class="line"><span class="params">        : <span class="string">&quot;cc&quot;</span>, <span class="string">&quot;memory&quot;</span></span></span><br><span class="line"><span class="params">    )</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> a;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<p><code>%[b]</code> 是命名参数, 与后面的<code>[a]</code>对应。</p>
<p><code>&quot;+r&quot;</code> read-write<br><code>&quot;=r&quot;</code> write only, 新定义一次，不读旧值<br><code>&quot;r&quot;</code>  read only，只读</p>
